<!DOCTYPE html>
<html>
  <head>
    <title>Exercise 4d</title>
    <style>
      body {
        font-family: Arial;
      }

      .title {
        font-size: 25px;
      }

      .login-form-button {
        background-color: rgb(0, 123, 255);
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-right: 5px;
      }

      .login-form-input {
        padding: 10px 15px;
        margin-bottom: 10px;
        border-radius: 5px;
        border-width: 1px;
        width: 200px;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>


    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      
      function LoginForm() {
        return (
          <>
            <div>
              <input
                className="login-form-input"
                placeholder="Email"
                size="20"
              />
            </div>
            <div>
              <input
                className="login-form-input"
                placeholder="Password"
                size="20"
                type="password"
              />
            </div>
            <button
              className="login-form-button"
            >Login</button>
            <button
              className="login-form-button"
            >Sign Up</button>
          </>
        );
      }

      function App() {
        return (
          <>
            <p
              className="title"
            >Hello, welcome to my website</p>
            <LoginForm />
          </>
        );
      }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
